name: usmart
description: "Smart Umbrella - Intelligent Beach Umbrella Control App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Local Storage
  shared_preferences: ^2.2.3

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  flex_color_picker: ^3.4.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo/Screenshot_2026-04-30_at_9.08.31_PM-removebg-preview.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/logo/Screenshot_2026-04-30_at_9.08.31_PM-removebg-preview.png"
    background_color: "#0f0f23"
    theme_color: "#7c3aed"
  windows:
    generate: true
    image_path: "assets/logo/Screenshot_2026-04-30_at_9.08.31_PM-removebg-preview.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/logo/Screenshot_2026-04-30_at_9.08.31_PM-removebg-preview.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/logo/
